plan_id: multi-index-demo
objective: Create a Python notebook demo that demonstrates agentic retrieval across two separate Azure AI Search indexes using one knowledge base with multiple knowledge sources
created_at: 2026-03-27T00:00:00Z
created_by: requirements-planner
status: completed
completed_at: 2026-03-27T00:00:00Z
research_confidence: high

tldr: |
  Build a comprehensive Python notebook that demonstrates multi-index agentic retrieval by:
  1. Creating two Azure AI Search indexes with identical schemas
  2. Splitting NASA Earth at Night dataset in half across both indexes
  3. Creating two knowledge sources (one per index)
  4. Creating one knowledge base that references both knowledge sources
  5. Executing queries that aggregate results across both indexes
  6. Displaying results with clear source index attribution in a side-by-side format

requirements_summary: |
  The demo notebook must showcase how Azure AI Search agentic retrieval can query multiple 
  search indexes simultaneously through a single knowledge base. The notebook will use the 
  existing NASA Earth at Night dataset, split evenly between two indexes (index-earth-1 and 
  index-earth-2). Both indexes will have identical schemas to focus on demonstrating query 
  and aggregation functionality rather than schema complexity.
  
  The knowledge base will be configured with two knowledge sources, each pointing to one of 
  the search indexes. When a user submits a query, the agentic retrieval pipeline will 
  decompose the query, run subqueries against both indexes, and aggregate results.
  
  The notebook will include high-level explanations for each step, making it accessible to 
  developers who want to understand multi-index retrieval patterns. Results will be displayed 
  with clear metadata showing which index each result came from, and a side-by-side comparison 
  view to help visualize the multi-source nature of the retrieval.

open_questions: []

risk_assessment:
  overall_risk_level: low
  critical_risks:
    - scenario: Data split logic may not evenly distribute semantic content between indexes
      likelihood: low
      impact: medium
      mitigation: Use simple array slicing (first half/second half) to ensure equal distribution of documents
    - scenario: Knowledge base API may not support multiple knowledge sources properly
      likelihood: low
      impact: high
      mitigation: Based on existing notebook code, the KnowledgeBase model accepts a list of KnowledgeSourceReference objects, indicating multi-source support is built-in
  assumptions:
    - Azure AI Search SDK supports multiple knowledge sources in a single knowledge base
    - NASA dataset has sufficient documents to make a meaningful split (at least 20+ documents)
    - The agentic retrieval pipeline automatically aggregates results from multiple sources
    - Results metadata includes source index information
  constraints:
    - Must use existing NASA Earth at Night dataset
    - Both indexes must have identical schema
    - Python notebook format only
    - High-level explanations required for all steps

implementation_specification:
  code_structure: |
    Jupyter notebook with sequentially ordered cells:
    1. Introduction and overview section
    2. Environment setup and configuration
    3. Index creation for both indexes
    4. Data loading and splitting
    5. Data upload to both indexes
    6. Knowledge source creation (two sources)
    7. Knowledge base creation (single KB with two sources)
    8. Query execution and result retrieval
    9. Result processing and side-by-side display
    10. Cleanup section
  
  affected_areas:
    - docs/ directory (new notebook file)
    - Environment configuration (.env file documentation)
  
  component_details:
    - component: Index Creation Module
      responsibility: Create two Azure AI Search indexes with identical schemas including vector search and semantic search configurations
      interfaces:
        - SearchIndexClient.create_or_update_index()
        - Index definitions with fields, vector_search, semantic_search
    
    - component: Data Split Module
      responsibility: Load NASA dataset from GitHub, split into two equal halves
      interfaces:
        - requests.get() for data retrieval
        - Array slicing for splitting documents
    
    - component: Knowledge Source Configuration
      responsibility: Create two knowledge sources, each targeting one search index
      interfaces:
        - SearchIndexClient.create_or_update_knowledge_source()
        - SearchIndexKnowledgeSource with search_index_parameters
    
    - component: Knowledge Base Configuration
      responsibility: Create one knowledge base referencing both knowledge sources
      interfaces:
        - SearchIndexClient.create_or_update_knowledge_base()
        - KnowledgeBase with multiple KnowledgeSourceReference objects
    
    - component: Multi-Index Query Module
      responsibility: Execute queries against the knowledge base with both sources enabled
      interfaces:
        - KnowledgeBaseRetrievalClient.retrieve()
        - KnowledgeBaseRetrievalRequest with multiple knowledge_source_params
    
    - component: Result Display Module
      responsibility: Parse results, extract source metadata, display side-by-side comparison
      interfaces:
        - result.response, result.references
        - Pandas DataFrame or formatted output for side-by-side view
  
  dependencies:
    - component: Environment Setup
      relationship: Provides credentials and endpoints to all Azure service calls
    
    - component: Index Creation
      relationship: Must complete before data upload and knowledge source creation
    
    - component: Data Split
      relationship: Must complete before data upload
    
    - component: Knowledge Source Creation
      relationship: Requires indexes to exist, provides sources to knowledge base
    
    - component: Knowledge Base Creation
      relationship: Requires both knowledge sources to exist, enables query execution
  
  integration_points:
    - Azure AI Search REST API via Python SDK
    - Azure OpenAI for embeddings and chat completions
    - GitHub raw content API for NASA dataset retrieval
    - DefaultAzureCredential for authentication

